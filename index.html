<!doctype html>
<html lang="de" class="spectrum spectrum--light spectrum--medium">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagebild KI</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <!-- Adobe Spectrum Design System -->
  <link rel="stylesheet" href="node_modules/@spectrum-css/tokens/dist/css/index.css">
  <link rel="stylesheet" href="node_modules/@spectrum-css/page/dist/index.css">
  <link rel="stylesheet" href="node_modules/@spectrum-css/typography/dist/index.css">
  <link rel="stylesheet" href="node_modules/@spectrum-css/divider/dist/index.css">
  <!-- Reveal.js -->
  <link rel="stylesheet" href="node_modules/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="node_modules/reveal.js/dist/theme/white.css">
  <!-- Source Sans Pro (Adobe open-source font) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap">
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <style>
    /* ── Reveal.js ↔ Spectrum token bridge ── */
    :root {
      --r-background-color: var(--spectrum-background-base-color, #ffffff);
      --r-main-color: var(--spectrum-neutral-content-color-default, #4b4b4b);
      --r-heading-color: var(--spectrum-title-color, #1d1d1d);
      --r-link-color: var(--spectrum-accent-color-900, #0265DC);
      --r-link-color-hover: var(--spectrum-accent-color-1000, #014caf);
      --r-selection-background-color: var(--spectrum-accent-color-200, #b8d4f5);
      --r-main-font: "Source Sans 3", var(--spectrum-sans-serif-font-family, sans-serif);
      --r-heading-font: "Source Sans 3", var(--spectrum-sans-serif-font-family, sans-serif);
      --r-heading-text-transform: none;
    }

    /* ── Typography ── */
    .reveal h1, .reveal h2, .reveal h3 {
      text-transform: none;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .reveal h1 { font-size: 2.4em; }
    .reveal h2 {
      font-size: 1.6em;
      border-bottom: 1px solid var(--spectrum-gray-300, #dadada);
      padding-bottom: 0.3em;
      display: inline-block;
    }
    .reveal strong {
      color: var(--spectrum-title-color, #1d1d1d);
    }

    /* ── Content ── */
    .reveal .subtitle {
      color: var(--spectrum-gray-600, #717171);
      font-size: 0.7em;
      margin-top: 0.5em;
    }
    .reveal .highlight {
      color: var(--spectrum-accent-color-900, #0265DC);
    }
    .reveal ul { text-align: left; }
    .reveal li {
      margin-bottom: 0.5em;
      font-size: 0.85em;
      line-height: 1.6;
    }

    /* ── Section labels ── */
    .reveal .section-label {
      font-size: 0.5em;
      color: var(--spectrum-gray-600, #717171);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5em;
      border-left: 3px solid var(--spectrum-accent-color-900, #0265DC);
      padding-left: 0.5em;
      display: inline-block;
    }

    /* ── Timeline ── */
    .reveal .timeline {
      text-align: left;
      font-size: 0.75em;
    }
    .reveal .timeline .year {
      color: var(--spectrum-accent-color-900, #0265DC);
      font-weight: 700;
      font-size: 1.1em;
    }
    .reveal .timeline li {
      margin-bottom: 0.6em;
      list-style: none;
    }

    /* ── Agenda grid ── */
    .reveal .agenda-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.3em 1.5em;
      text-align: left;
      font-size: 0.75em;
    }
    .reveal .agenda-grid .time {
      color: var(--spectrum-accent-color-900, #0265DC);
      font-family: monospace;
      white-space: nowrap;
    }
    .reveal .agenda-grid .current {
      color: var(--spectrum-title-color, #1d1d1d);
      font-weight: bold;
    }

    /* ── Icons (Material Symbols) ── */
    .reveal .icon {
      font-family: 'Material Symbols Outlined';
      font-size: 1.2em;
      vertical-align: -0.15em;
      margin-right: 0.3em;
      color: var(--spectrum-accent-color-900, #0265DC);
      font-weight: normal;
      font-style: normal;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      display: inline-block;
      text-rendering: optimizeLegibility;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
    }
    .reveal .emoji {
      font-size: 1.4em;
      margin-right: 0.3em;
    }

    /* ── Usage stats ── */
    .reveal .stats-topline,
    .reveal .stats-grid {
      display: grid;
      gap: 0.8em;
    }
    .reveal .stats-topline {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 1.2em 0 0.9em;
    }
    .reveal .stats-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 1em;
    }
    .reveal .stats-card,
    .reveal .tool-card {
      text-align: left;
      border: 1px solid var(--spectrum-gray-300, #dadada);
      border-radius: 18px;
      padding: 0.9em 1em;
      background:
        linear-gradient(180deg, rgba(2, 101, 220, 0.06), rgba(255, 255, 255, 0)),
        var(--spectrum-background-base-color, #ffffff);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }
    .reveal .stats-card .value,
    .reveal .tool-card .primary {
      display: block;
      font-size: 1.3em;
      font-weight: 700;
      color: var(--spectrum-title-color, #1d1d1d);
      line-height: 1.1;
    }
    .reveal .stats-card .label,
    .reveal .tool-card .tool-since,
    .reveal .tool-card .metric-label {
      display: block;
      margin-top: 0.25em;
      font-size: 0.48em;
      color: var(--spectrum-gray-700, #5c5c5c);
      line-height: 1.4;
    }
    .reveal .tool-card .tool-name {
      font-size: 0.65em;
      font-weight: 700;
      color: var(--spectrum-accent-color-900, #0265DC);
      margin-bottom: 0.45em;
      letter-spacing: 0.01em;
    }
    .reveal .tool-card .tool-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7em;
      margin-top: 0.8em;
      padding-top: 0.8em;
      border-top: 1px solid var(--spectrum-gray-200, #e6e6e6);
    }
    .reveal .tool-card .metric-number {
      display: block;
      font-size: 0.72em;
      font-weight: 700;
      color: var(--spectrum-title-color, #1d1d1d);
      line-height: 1.1;
    }
    .reveal .stats-footnote {
      margin-top: 1em;
      font-size: 0.5em;
      color: var(--spectrum-gray-600, #717171);
    }
    .reveal .tool-callouts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55em;
      margin-top: 0.75em;
      align-items: flex-start;
    }
    .reveal .tool-callouts:empty {
      display: none;
    }
    .reveal .tool-callouts-label {
      width: 100%;
      font-size: 0.4em;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--spectrum-gray-700, #5c5c5c);
    }
    .reveal .tool-pill {
      display: inline-flex;
      flex-direction: column;
      gap: 0.1em;
      text-align: left;
      border: 1px solid var(--spectrum-gray-300, #dadada);
      border-radius: 16px;
      padding: 0.45em 0.7em;
      background: rgba(2, 101, 220, 0.04);
    }
    .reveal .tool-pill-name {
      font-size: 0.42em;
      font-weight: 700;
      color: var(--spectrum-accent-color-900, #0265DC);
      line-height: 1.2;
    }
    .reveal .tool-pill-meta {
      font-size: 0.34em;
      color: var(--spectrum-gray-700, #5c5c5c);
      line-height: 1.3;
    }

    /* ── Links ── */
    .reveal a {
      color: var(--spectrum-accent-color-900, #0265DC);
    }

    /* ── Logo footer ── */
    .logo-footer {
      position: fixed;
      bottom: 16px;
      right: 24px;
      z-index: 10;
    }
    .logo-footer img {
      height: 48px;
      opacity: 0.4;
      mix-blend-mode: multiply;
      object-fit: cover;
      object-position: center 35%;
      clip-path: inset(10% 5% 25% 5%);
    }

    /* ── Slide padding & overflow guard ── */
    .reveal .slides section {
      padding: 1em 0;
      box-sizing: border-box;
    }
    .reveal .slides > section > section {
      overflow: hidden;
    }

    /* ── Progress bar ── */
    .reveal .progress span {
      background: var(--spectrum-accent-color-900, #0265DC);
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides" id="slides-container">
      <!-- Slides are loaded dynamically from slides/*.html -->
    </div>
    <div class="logo-footer">
      <img src="assets/logo-ihloff.webp" alt="IHLOFF">
    </div>
  </div>

  <script src="node_modules/reveal.js/dist/reveal.js"></script>
  <script>
    /* ── Slide loader ── */
    var slideFiles = [
      'slides/00-title.html',
      'slides/01-about.html',
      'slides/03-lagebild.html',
      'slides/04-project.html',
      'slides/05-agenda.html',
      'slides/06-end.html',
      'slides/07-backup-projects.html',
      'slides/08-followup.html'
    ];

    Promise.all(
      slideFiles.map(function(file) {
        return fetch(file, { cache: 'no-store' })
          .then(function(response) {
            if (!response.ok) throw new Error('Failed to load ' + file);
            return response.text();
          });
      })
    ).then(function(htmlParts) {
      document.getElementById('slides-container').innerHTML = htmlParts.join('\n');
      initUsageStats();
      Reveal.initialize({
        hash: true,
        slideNumber: true,
        transition: 'fade',
        transitionSpeed: 'fast',
        controls: true,
        progress: true,
        margin: 0.15,
      });
    }).catch(function(err) {
      console.error('Slide loading failed:', err);
      document.getElementById('slides-container').innerHTML =
        '<section><h1>Fehler beim Laden</h1><p>' + err.message + '</p></section>';
    });

    /* ── Usage stats helpers ── */
    function formatInteger(value) {
      return new Intl.NumberFormat('de-DE', {
        maximumFractionDigits: 0
      }).format(value);
    }

    function formatMonthYear(value) {
      if (!value) {
        return 'Lokale Historie nicht verfuegbar';
      }

      return new Date(value + 'T00:00:00Z').toLocaleDateString('de-DE', {
        month: 'short',
        year: 'numeric',
        timeZone: 'UTC'
      });
    }

    function formatDate(value) {
      if (!value) {
        return 'unbekannt';
      }

      return new Date(value + 'T00:00:00Z').toLocaleDateString('de-DE', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        timeZone: 'UTC'
      });
    }

    function formatToolList(items) {
      if (!items.length) {
        return 'keine lokalen Coding-Tools';
      }
      if (items.length === 1) {
        return items[0];
      }
      if (items.length === 2) {
        return items[0] + ' und ' + items[1];
      }

      return items.slice(0, -1).join(', ') + ' und ' + items[items.length - 1];
    }

    function renderUsageStats(data) {
      var visibleTools = data.tools.filter(function(tool) {
        return tool.hours > 0 || tool.activeDays > 0 || tool.projects > 0;
      });
      var primaryTools = visibleTools.filter(function(tool) {
        return tool.hours > 0;
      });
      var secondaryTools = visibleTools.filter(function(tool) {
        return tool.hours <= 0 && (tool.activeDays > 0 || tool.projects > 0);
      });

      document.getElementById('stats-total-hours').textContent = '~' + formatInteger(data.summary.hours);
      document.getElementById('stats-total-days').textContent = formatInteger(data.summary.activeDays);
      document.getElementById('stats-total-projects').textContent = formatInteger(data.summary.projects);

      var toolCardsHtml = primaryTools.map(function(tool) {
        var sinceLabel = tool.since
          ? 'seit ' + formatMonthYear(tool.since)
          : 'keine Aktivitaet im Zeitraum';

        return [
          '<div class="tool-card">',
          '  <div class="tool-name">' + tool.name + '</div>',
          '  <span class="primary">~' + formatInteger(tool.hours) + ' Std.</span>',
          '  <div class="tool-since">' + sinceLabel + '</div>',
          '  <div class="tool-metrics">',
          '    <div>',
          '      <span class="metric-number">' + formatInteger(tool.activeDays) + '</span>',
          '      <span class="metric-label">aktive Tage</span>',
          '    </div>',
          '    <div>',
          '      <span class="metric-number">' + formatInteger(tool.projects) + '</span>',
          '      <span class="metric-label">Projekte</span>',
          '    </div>',
          '  </div>',
          '</div>'
        ].join('');
      }).join('');

      if (!toolCardsHtml) {
        toolCardsHtml = [
          '<div class="tool-card">',
          '  <div class="tool-name">Keine belastbaren Stundenmetriken</div>',
          '  <span class="primary">nur leichte Nutzung gefunden</span>',
          '  <div class="tool-since">Weitere Tools werden unten kompakt angezeigt.</div>',
          '</div>'
        ].join('');
      }

      var secondaryToolsHtml = secondaryTools.length
        ? [
            '<div class="tool-callouts-label">Weitere Tools mit Aktivitaet</div>',
            secondaryTools.map(function(tool) {
              var parts = [];

              if (tool.activeDays > 0) {
                parts.push(formatInteger(tool.activeDays) + ' Tage');
              }
              if (tool.projects > 0) {
                parts.push(formatInteger(tool.projects) + ' Projekte');
              }
              if (tool.since) {
                parts.push('seit ' + formatMonthYear(tool.since));
              }

              return [
                '<div class="tool-pill">',
                '  <span class="tool-pill-name">' + tool.name + '</span>',
                '  <span class="tool-pill-meta">' + parts.join(' &middot; ') + '</span>',
                '</div>'
              ].join('');
            }).join('')
          ].join('')
        : '';

      document.getElementById('tool-stats-grid').innerHTML = toolCardsHtml;
      document.getElementById('tool-callouts').innerHTML = secondaryToolsHtml;
      document.getElementById('usage-stats-subtitle').textContent =
        'Lokal seit ' + formatDate(data.summary.since) + ' \u00b7 ' +
        formatToolList(visibleTools.map(function(tool) { return tool.name; }));
      document.getElementById('stats-footnote').textContent =
        'Stand ' + formatDate(data.generatedAt) + ' \u00b7 ' + data.note;
    }

    function initUsageStats() {
      fetch('assets/usage-stats.json', { cache: 'no-store' })
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Could not load local usage stats');
          }
          return response.json();
        })
        .then(renderUsageStats)
        .catch(function() {
          document.getElementById('usage-stats-subtitle').textContent =
            'Lokale Nutzung konnte nicht geladen werden';
          document.getElementById('tool-stats-grid').innerHTML = [
            '<div class="tool-card">',
            '  <div class="tool-name">Keine Stats-Datei gefunden</div>',
            '  <span class="primary">npm run refresh:stats</span>',
            '  <div class="tool-since">Dann die Deck-Ansicht neu laden.</div>',
            '</div>'
          ].join('');
          document.getElementById('tool-callouts').innerHTML = '';
          document.getElementById('stats-footnote').textContent =
            'Lokale Session-Logs konnten nicht gelesen werden.';
        });
    }
  </script>
</body>
</html>
